name: AI Automated Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: |
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          if (Test-Path package.json) { npm ci }
        shell: pwsh

      - name: Run AI test runner
        run: pwsh -File scripts\\run_ai_tests.ps1 -TestType "e2e" -Target "tests" -ReportFormat "html"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: artifacts/**
